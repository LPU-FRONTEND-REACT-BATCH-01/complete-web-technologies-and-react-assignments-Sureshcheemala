<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html{
            font-size: 10px;
        }
        .parent{
            width: 400px;
            height: 400px;
            background-color: aqua;
            font-size: 2rem;
        }
        .child1{
            font-size: 2em;
        }
        .child2{
            font-size: 2em;
        }
        .child3{
            font-size: 2em;
        }
    </style>
</head>
<body>
    <div class="parent">
        <p class="child1">Hello Everyone</p>
        <p class="child2">This is a paragraph</p>
        <p class="child3">This is a second paragraph</p>
    </div>
</body>
</html>
