<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul h1:first-child{
            color: aqua;
        }
        ul li:last-child{
            color: red;
        }
        ul li:nth-child(8){
            color: greenyellow;
        }
        ul li:first-of-type{
            color: grey;
        }
        ul h1:last-of-type{
            color: brown;
        }
        ul p:first-of-type{
            color: blanchedalmond;
        }
        ul li:nth-of-type(3){
            color: blue;
        }
        ul li:nth-last-of-type(3){
            color: blueviolet;
        }
        ul li:nth-of-type(2n + 1){
            color: olive;
        }
    </style>
</head>
<body>
    <ul>
        <h1>List of Bikes</h1>
        <li>Royal Enfield</li>
        <li>Lord Splender</li>
        <li>KTM</li>
        <p>Imposter</p>
        <li>R15</li>
        <li>Ninja</li>
        <li>Harley Davidson</li>
        <li>Hyusong</li>
        <li>Ducati</li>
    
        <h1>List of Cars</h1>
        <li>Audi</li>
        <li>Alto</li>
        <li>Skoda</li>
        <li>Volkswagon</li>
    </ul>
</body>
</html>
