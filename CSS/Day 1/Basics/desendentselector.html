<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .biryani>li{
            color: orange;
        }
        h1~h1{
            color: grey;
        }
        .chicken{
            color:crimson;
        }
        .biryani>div+li{
            color: blue;
        }
        .lassi>li{
            color: green;
        }
        .sugar{
            color:aqua;
        }
        h1:nth-of-type(2)~li{
            color:blueviolet;
        }
        li:last-of-type{
            color: brown;
        }
    </style>
</head>
<body>
    <ul class="biryani">
        <h1>Ingredients for biryani</h1>
        <li>Biryani</li>
        <li>Chicken</li>
        <div>
            <ul class="chicken">
                <li>Grilled Chicken</li>
                <li>Fried Chicken</li>
                <li>Roasted Chicken</li>
            </ul>
        </div>

        <li>Paneer</li>
        <h1>Fighter Jet</h1>
        <li>Spices</li>
        <li>Gas</li>
    </ul>

    <ul class="lassi">
        <h1>Ingredients for Lassi</h1>
        <li>Curd</li>
        <li>Sugar</li>
        <div>
            <ul class="sugar">
                <li>White Sugar</li>
                <li>Brown Sugar</li>
            </ul>
        </div>
        <li>Water</li>
        <li>kova</li>
    </ul>
</body>
</html>
