<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 400px;
            width: 700px;
            text-align: center;
        }

        div h2{
            text-decoration: underline;
        }
        h1:first-letter{
            color: purple;
            
        }
        h2{
            color: grey;
        }
        div:hover{
            box-shadow: 10px 10px 10px black;
        }
        
        div:hover h1{
            letter-spacing: 10px;
        }

        div:hover h2{
            color: purple;
        }
            
    </style>

</head>
<body>
    <div>
        <h1>The only way to do great work is to love what you do.</h1>
        <h2 > -- Steve Jobs -- </h2>
    </div>
</body>
</html>
