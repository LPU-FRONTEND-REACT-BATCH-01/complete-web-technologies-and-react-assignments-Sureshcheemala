<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin-bottom: 2000px;
        }
        .container{
            width: 500px;
            height: 500px;
            background-color: antiquewhite;
            position: static;
            display: flex;
        }
        .item{
            width: 100px;
            height: 100px;
            background-color: rgb(201, 94, 94);
            border: 10px solid red;
            border-radius: 20px;
        }
        .items1{
            flex-shrink: 1;
            flex-grow: 2;
            align-self: flex-start;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="items1 item">Item 1</div>
        <div class="items2 item">Item 2</div>
        <div class="items3 item">Item 3</div>
        <div class="items4 item">Item 4</div>
    </div>
</body>
</html>
