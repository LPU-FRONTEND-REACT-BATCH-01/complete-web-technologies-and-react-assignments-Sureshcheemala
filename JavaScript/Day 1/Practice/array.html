<html lang="en">

<body>
    <script>
        let arr = [12, "hello", true, undefined]
        console.log(arr)

        arr.push(21)
        console.log(arr)

        arr.pop()
        console.log(arr)

        arr.shift()
        console.log(arr)

        arr.unshift(100)
        console.log(arr)

        console.log(arr.length)
    </script>
</body>
