<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = Number(prompt("Enter number"))
        if(a < 8){
            for(let i = 0; i < a; i++){
                console.log("It is " + a)
            }
        }else{
            for(let i = 0; i < a * a; i++){
                console.log("It is " + a)
            }
        }
    </script>
</body>
</html>
