<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 100%;
            height: 400px;
        }
        @media (min-width: 768px){
            .container{
                flex-shrink: 2;
                background-color: blue;
            }
        }
         @media (max-width: 1024px){
            .container{
                flex-shrink: 4;
                background-color: red;
            }
        }
    </style>
</head>
<body>
    <div class="container"></div>
</body>
</html>
