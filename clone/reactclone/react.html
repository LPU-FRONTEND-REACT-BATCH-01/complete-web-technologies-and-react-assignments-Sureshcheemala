<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>React UI Clone</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  transition: 0.3s;
}

/* DARK MODE */
body.dark {
  background: radial-gradient(
      800px 400px at 50% -150px,
      rgba(59,130,246,0.15),
      transparent
    ),
    #23272f;
  color: #e5e7eb;
}

/* LIGHT MODE */
body.light {
  background: #ffffff;
  color: #111827;
}

/* NAVBAR */
.navbar {
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

body.dark .navbar {
  background: #23272f;
}

body.light .navbar {
  background: #ffffff;
}

.left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  width: 38px;
}

.version {
  font-size: 12px;
  color: #9ca3af;
}

/* SEARCH */
.search {
  margin-left: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-radius: 999px;
  padding: 12px 12px;
  width: 900px;
}

body.dark .search {
  background: rgba(255,255,255,0.06);
}

body.light .search {
  background: #f3f4f6;
}

.search input {
  background: transparent;
  border: none;
  outline: none;
  flex: 1;
}

.kbd {
  padding: 2px 6px;
  border-radius: 6px;
  font-size: 12px;
}

/* RIGHT */
.right {
  display: flex;
  align-items: center;
  gap: 24px;
}

.right a {
  text-decoration: none;
  font-size: 14px;
}

.icon {
  cursor: pointer;
  width: 20px;
}

/* HERO */
.hero {
  height: calc(100vh - 64px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero img {
  width: 90px;
  margin-bottom: 20px;
}

.hero h1 {
  font-size: 60px;
  font-weight: 500;
}

.hero p {
  font-size: 22px;
  margin-top: 15px;
}

/* BUTTONS */
.buttons {
  margin-top: 30px;
  display: flex;
  gap: 16px;
}

.primary {
  background: #61dafb;
  color: black;
  padding: 12px 26px;
  border-radius: 999px;
}

.secondary {
  border: 1px solid gray;
  padding: 12px 26px;
  border-radius: 999px;
}

.right {
  display: flex;
  align-items: center;
  gap: 24px;
  color: white; /* ✅ add this */
}

.right a {
  text-decoration: none;
  font-size: 14px;
  color: white; /* ✅ add this */
}

.right a:hover {
  color: #e5e7eb; /* optional hover like React.dev */
}
</style>
</head>

<body class="dark">

<!-- NAVBAR -->
<div class="navbar">

  <div class="left">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg" class="logo">
    <span class="version">v19.2</span>

    <div class="search">
      <input placeholder="Search">
      <span class="kbd">Ctrl K</span>
    </div>
  </div>

  <div class="right">
    <a href="#">Learn</a>
    <a href="#">Reference</a>
    <a href="#">Community</a>
    <a href="#">Blog</a>


  <!-- THEME (SUN) -->
  <svg onclick="toggleTheme()" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
    <circle cx="12" cy="12" r="4"></circle>
    <line x1="12" y1="2" x2="12" y2="4"></line>
    <line x1="12" y1="20" x2="12" y2="22"></line>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
    <line x1="2" y1="12" x2="4" y2="12"></line>
    <line x1="20" y1="12" x2="22" y2="12"></line>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
  </svg>

  <!-- LANGUAGE (Translate icon) -->
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
    <path d="M4 5h12"></path>
    <path d="M10 5c0 7-6 7-6 7"></path>
    <path d="M14 15l4 4"></path>
    <path d="M14 19l4-4"></path>
  </svg>

  <!-- GITHUB (Octocat proper shape simplified) -->
  <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 2C6.48 2 2 6.58 2 12.26c0 4.5 2.87 8.32 6.84 9.67.5.09.66-.22.66-.48 
    0-.24-.01-.87-.01-1.7-2.78.62-3.37-1.37-3.37-1.37-.45-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 
    1 .07 1.53 1.05 1.53 1.05.9 1.56 2.36 1.11 2.93.85.09-.67.35-1.11.64-1.37-2.22-.26-4.55-1.14-4.55-5.07 
    0-1.12.39-2.03 1.03-2.74-.1-.26-.45-1.3.1-2.7 0 0 .85-.28 2.8 1.05A9.38 9.38 0 0112 6.8c.85.004 1.7.12 
    2.5.35 1.94-1.33 2.79-1.05 2.79-1.05.56 1.4.21 2.44.11 2.7.64.71 1.03 1.62 1.03 2.74 
    0 3.94-2.34 4.8-4.57 5.06.36.32.68.95.68 1.92 0 1.38-.01 2.49-.01 2.83 
    0 .27.16.58.67.48A10.27 10.27 0 0022 12.26C22 6.58 17.52 2 12 2z"/>
  </svg>
</div>

  </div>

</div>

<!-- HERO -->
<div class="hero">

  <img src="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg">

  <h1>React</h1>

  <p>The library for web and native user interfaces</p>

  <div class="buttons">
    <div class="primary">Learn React</div>
    <div class="secondary">API Reference</div>
  </div>

</div>

<script>
function toggleTheme() {
  document.body.classList.toggle("light");
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
