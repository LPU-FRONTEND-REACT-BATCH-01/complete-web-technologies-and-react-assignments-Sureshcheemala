    <h2>(a + b)<sup>3</sup> =  a<sup>3</sup> + b <sup>3</sup> + 3ab <sup>2</sup> + 3ba <sup>2</sup></h2>

    <h2>a<sup>2</sup> - b<sup>2</sup> = (a - b)(a + b)</h2>

    <h2>(x + y)(x - y) = x<sup>2</sup> - y<sup>2</sup></h2>
    <h2>10<sup>2</sup> = 100</h2>
