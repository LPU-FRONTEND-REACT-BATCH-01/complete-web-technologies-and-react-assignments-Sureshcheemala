<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <form action="">
        <label for="username">Username:</label>
        <input id="username" placeholder="username" autocomplete="off" type="text"></br></br>
        <label for="password">Password: </label>
        <input id="password" placeholder="password" type="password"></br></br>
        <label for="email">Email: </label>
        <input id="email" placeholder="email" type="email"></br></br>
        <label for="">Gender: </label>
        <input name="gender" value="male" type="radio">Male
        <input name="gender" value="female" type="radio">Female</br></br>
        <label for="skills">Skills: </label>

        <input name="skills" id="skills" type="checkbox">HTML
        <input name="skills" id="skills" type="checkbox">JS</br></br>

        <input min="0" max="100" type="range"></br></br>

        <input type="date" min="2026-04-02"></br></br>
        <input type="datetime-local"></br></br>
        <input type="time"></br></br>
        <input type="file"></br></br>

        <select name="city" id="">
            <optgroup label="Punjab">
                <option value="">Jalandhar</option>
                <option value="">Amritsar</option>
            </optgroup>
        </select></br></br>
        <input type="reset" value="reset">
        <input type="submit" value="submit">
    </form>
</body>
</html>
