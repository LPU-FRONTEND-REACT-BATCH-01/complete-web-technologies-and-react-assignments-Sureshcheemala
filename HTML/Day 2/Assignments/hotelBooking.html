<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hotel Booking</h1>
    <form action="">
        <label for="name">Name:</label></br>
        <input id="name" type="text" placeholder="first name">
        <input id="name" type="text" placeholder="last name"><br></br>

        <label for="">Gender:</label>
        <input name="gender" type="radio" value="Male">Male
        <input name="gender" type="radio" value="Female">Female</br></br>

        <label for="email">Email:</label></br>
        <input id="email" type="email" placeholder="email@email.com"></br></br>

        <label for="room">Room Type</label></br>
        <select name="room" id="">
            <optgroup label="Room Type">
                <option value="">Normal</option>
                <option value="">Deluxe</option>
                <option value="">Platinum</option>
            </optgroup>
        </select><br></br>

        <label for="">Number of Guests</label></br>
        <input min="0" max="15" type="number"></br></br>

        <label for="">Arrival Date And Time</label></br>
        <input type="datetime-local" min="2026-04-02"></br></br>

        <lable for="">Departure Date</lable></br>
        <input type="date" min="2026-04-03"></br></br>

        <label for="">City</label>
        <select name="city" id="">
            <optgroup label="Punjab">
                <option value="">Jalandhar</option>
                <option value="">Amritsar</option>
                <option value="">Ludhiana</option>
            </optgroup>
        </select></br></br>

        <input type="checkbox">Agree to terms and conditions</br></br>

        <textarea >Special Requests</textarea>
    </form>
</body>
</html>
